<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>NPCA Cricket Academy</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<header>

<h1 id="mainTitle">

🏏 NPCA Cricket Academy

</h1>

<p>Nishant Pagare Cricket Academy</p>
<select id="languageSelect">

<option value="en">

English

</option>

<option value="mr">

मराठी

</option>

</select>
</header>
<section class="banner">

<h2>

Train Like A Champion 🏏

</h2>

<p>

Welcome To NPCA Cricket Academy

</p>

<button onclick="window.location.href='login.html'">

Student Login

</button>

</section>
<section class="card">

<h2>Student Registration</h2>

<input type="text"
id="name"
placeholder="Student Name">

<input type="text"
id="parent"
placeholder="Parent Name">

<input
type="file"
id="photo">

<input type="date"
id="dob">

<input type="tel"
id="mobile"
placeholder="Mobile Number">

<textarea
id="address"
placeholder="Address"></textarea>

<select id="role">

<option>Batsman</option>

<option>Bowler</option>

<option>All Rounder</option>

<option>Wicket Keeper</option>

</select>

<select id="batch">

<option>Morning Batch</option>

<option>Evening Batch 4 PM - 6:30 PM</option>

<option>Evening Batch 6:30 PM - 9 PM</option>

</select>

<button id="registerBtn">
Register Student
</button>

</section>

<script type="module"
src="script.js"></script>

</body>
</html>
